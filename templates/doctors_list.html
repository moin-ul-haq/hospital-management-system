{% extends 'base.html' %}

{% block title %}Doctors | HMS{% endblock %}

{% block content %}
<h2>Doctors</h2>
<ul>
  {% for doctor in doctors %}
    <li>
      <strong>{{ doctor.user.name }}</strong>
      - {{ doctor.specialization }}
      - {{ doctor.qualification }}
    </li>
  {% empty %}
    <li>No doctors found.</li>
  {% endfor %}
</ul>
{% endblock %}
